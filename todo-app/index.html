<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="todo-wrapper">
            <!-- Header -->
            <div class="header">
                <h1>📝 My To-Do List</h1>
                <p class="subtitle">Organize your tasks and boost productivity</p>
            </div>

            <!-- Input Section -->
            <div class="input-section">
                <form id="todoForm" class="todo-form">
                    <div class="input-group">
                        <input 
                            type="text" 
                            id="todoInput" 
                            class="todo-input" 
                            placeholder="Add a new task..."
                            autocomplete="off"
                        >
                        <button type="submit" class="add-btn">+ Add Task</button>
                    </div>
                    <div class="category-section">
                        <label for="categorySelect">Category:</label>
                        <select id="categorySelect" class="category-select">
                            <option value="work">Work</option>
                            <option value="personal">Personal</option>
                            <option value="shopping">Shopping</option>
                            <option value="health">Health</option>
                            <option value="other">Other</option>
                        </select>
                        <label for="prioritySelect">Priority:</label>
                        <select id="prioritySelect" class="priority-select">
                            <option value="low">Low</option>
                            <option value="medium" selected>Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                </form>
            </div>

            <!-- Filter and Sort Section -->
            <div class="filter-section">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
                <div class="sort-buttons">
                    <button class="sort-btn" id="sortByDate">📅 Date</button>
                    <button class="sort-btn" id="sortByPriority">⚡ Priority</button>
                    <button class="sort-btn" id="sortByCategory">📂 Category</button>
                </div>
            </div>

            <!-- Stats Section -->
            <div class="stats-section">
                <div class="stat-item">
                    <span class="stat-label">Total:</span>
                    <span class="stat-value" id="totalTasks">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Completed:</span>
                    <span class="stat-value" id="completedTasks">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Remaining:</span>
                    <span class="stat-value" id="remainingTasks">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Progress:</span>
                    <span class="stat-value" id="progressPercent">0%</span>
                </div>
            </div>

            <!-- Todo List -->
            <div class="todo-list-container">
                <ul class="todo-list" id="todoList"></ul>
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">🎉</div>
                    <p>No tasks yet! Add one to get started.</p>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="btn btn-secondary" id="clearCompletedBtn">Clear Completed</button>
                <button class="btn btn-secondary" id="exportBtn">📥 Export</button>
                <button class="btn btn-danger" id="deleteAllBtn">🗑️ Delete All</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
